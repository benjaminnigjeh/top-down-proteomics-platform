name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run linter
        working-directory: backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || true

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/test_tdportal.db
          DEMO_MODE_ENABLED: "true"
          DATA_DIR: /tmp/tdportal
          UPLOAD_DIR: /tmp/tdportal/uploads
          JOB_DIR: /tmp/tdportal/jobs
        run: |
          mkdir -p /tmp/tdportal/uploads /tmp/tdportal/jobs
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile.backend -t tdportal-backend:ci ./backend

      - name: Build worker image
        run: docker build -f backend/Dockerfile.worker -t tdportal-worker:ci ./backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.frontend -t tdportal-frontend:ci ./frontend

      - name: Smoke test backend
        run: |
          docker run -d --name backend-test \
            -e DATABASE_URL=sqlite:////tmp/test.db \
            -e DEMO_MODE_ENABLED=true \
            -e DATA_DIR=/tmp \
            -e UPLOAD_DIR=/tmp/uploads \
            -e JOB_DIR=/tmp/jobs \
            -p 8001:8000 \
            tdportal-backend:ci
          sleep 8
          curl -f http://localhost:8001/api/v1/health
          curl -f http://localhost:8001/api/v1/engines
          docker stop backend-test

  # ────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test (Demo Engine)
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run integration test with demo engine
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/integration_test.db
          DEMO_MODE_ENABLED: "true"
          DATA_DIR: /tmp/tdportal_int
          UPLOAD_DIR: /tmp/tdportal_int/uploads
          JOB_DIR: /tmp/tdportal_int/jobs
        run: |
          mkdir -p /tmp/tdportal_int/uploads /tmp/tdportal_int/jobs
          python -c "
import sys, os
sys.path.insert(0, '.')
os.environ.setdefault('DATABASE_URL', 'sqlite:////tmp/integration_test.db')

from app.database import create_all_tables
from app.engines.demo import DemoAdapter
from pathlib import Path

# Verify demo engine works end-to-end
create_all_tables()
adapter = DemoAdapter()
assert adapter.validate_installation(), 'Demo engine not available'

import tempfile
with tempfile.TemporaryDirectory() as tmp:
    tmp = Path(tmp)
    logs = []
    adapter.run_search([], tmp / 'fake.fasta', {}, tmp / 'out', logs.append)
    results = adapter.parse_results(tmp / 'out')
    assert len(results) == 50, f'Expected 50 results, got {len(results)}'
    assert all(r.is_demo for r in results), 'All demo results must be flagged'
    print(f'Integration test passed: {len(results)} demo results')
"
