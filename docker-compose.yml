version: "3.9"

services:
  # ─────────────── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── Backend API ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/tdportal.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATA_DIR: /data
      UPLOAD_DIR: /data/uploads
      JOB_DIR: /data/jobs
      DEMO_MODE_ENABLED: "true"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost"]'
    volumes:
      - tdportal_data:/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─────────────── Celery Worker ────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      args:
        INSTALL_TOPPIC: ${INSTALL_TOPPIC:-0}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/tdportal.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATA_DIR: /data
      UPLOAD_DIR: /data/uploads
      JOB_DIR: /data/jobs
      DEMO_MODE_ENABLED: "true"
    volumes:
      - tdportal_data:/data
      # Mount optional engine binaries from host
      - ${TOPPIC_BIN_DIR:-/dev/null}:/engines/toppic:ro
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ─────────────── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tdportal_data:
    driver: local
